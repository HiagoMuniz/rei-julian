<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei Julian - Painel do Restaurante</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h1>Painel Restaurante</h1>
                    <a href="/" style="color: #cbd5e1; font-size: 0.85rem; text-decoration: none;">Sair</a>
                </div>
                <p>Monitoramento de Frota</p>
            </header>
            <div class="driver-list-container">
                <div id="driver-list"></div>
            </div>
            <footer class="controls">
                <button class="btn" onclick="togglePaths()">Ver Rotas de Entrega</button>
            </footer>
        </aside>
        <main id="map"></main>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
