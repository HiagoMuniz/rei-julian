<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Rei Julian - Rastreamento</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // Coordenada inicial (Praça Coronel Pedro Osório)
  const initialLat = -31.770687426923516;
  const initialLng = -52.34135057529372;

  // Cria mapa
  const map = L.map('map').setView([initialLat, initialLng], 17);

  // Camada base (OpenStreetMap)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);

  // Dicionário para armazenar múltiplos marcadores
  const markers = {};

  // Função para obter cor baseada no ID
  function getMarkerColor(id) {
    if (id === 'julian') return 'blue';
    if (id === 'mort') return 'red';
    return 'green';
  }

  // Conexão SSE com backend
  const source = new EventSource("/stream");

  source.onmessage = function(event) {
    const data = JSON.parse(event.data);

    const id = data.id;
    const lat = data.latitude;
    const lng = data.longitude;

    if (!markers[id]) {
      // Cria novo marcador se não existir
      markers[id] = L.marker([lat, lng], {
        title: id
      }).addTo(map);
      
      // Adiciona um Tooltip permanente acima do pin
      markers[id].bindTooltip(id, {
        permanent: true,
        direction: 'top',
        className: 'marker-label'
      }).openTooltip();

      markers[id].bindPopup(`Indivíduo: ${id}`);
    } else {
      // Move marcador existente
      markers[id].setLatLng([lat, lng]);
    }

    // Opcional: Centraliza o mapa no primeiro que se mover (ou remove se quiser livre)
    // map.panTo([lat, lng]);

    console.log("Atualizado:", id, lat, lng);
  };

  source.onerror = function(err) {
    console.error("Erro SSE:", err);
  };
</script>

</body>
</html>
