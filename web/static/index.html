<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei Julian - Sistema Logístico</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .portal-container {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            text-align: center;
        }
        .portal-container h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px;}
        .portal-container > p { color: #64748b; margin-bottom: 40px; font-size: 1.1rem;}
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .portal-card {
            background: white;
            padding: 40px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        .portal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }
        .portal-card h2 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.4rem;}
        .portal-card p { margin: 0; color: #64748b; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1>Rei Julian</h1>
        <p>Sistema Integrado de Rastreamento Logístico</p>
        
        <div class="portal-grid">
            <a href="/admin" class="portal-card">
                <h2>Restaurante</h2>
                <p>Painel de controle e monitoramento da frota</p>
            </a>
            <a href="/driver" class="portal-card">
                <h2>Entregador</h2>
                <p>Interface móvel de atualização de rota</p>
            </a>
            <a href="/client" class="portal-card">
                <h2>Cliente</h2>
                <p>Acompanhamento de pedido em tempo real</p>
            </a>
        </div>
    </div>
</body>
</html>
